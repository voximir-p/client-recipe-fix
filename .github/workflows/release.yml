name: Build and Release

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. 1.1.0+mc21.10-21.11)'
        required: true

permissions:
  contents: write

jobs:
  build-setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
      version: ${{ steps.tag_info.outputs.version }}
    steps:
      - name: Resolve tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from tag
        id: tag_info
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          VERSION="${TAG%%+*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: build-setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-setup.outputs.tag }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        run: ./gradlew build

      - name: Rename jar and generate sha256
        run: |
          TAG="${{ needs.build-setup.outputs.tag }}"
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          mv "build/libs/client-recipe-fix-${MOD_VERSION}.jar" \
             "build/libs/client-recipe-fix-${TAG}.jar"
          cd build/libs
          sha256sum -b "client-recipe-fix-${TAG}.jar" > "client-recipe-fix-${TAG}.jar.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libs/client-recipe-fix-${{ needs.build-setup.outputs.tag }}.jar
            build/libs/client-recipe-fix-${{ needs.build-setup.outputs.tag }}.jar.sha256

  release-setup:
    needs: [build-setup, build]
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-setup.outputs.tag }}

      - name: Fetch latest CHANGELOG.md from default branch
        run: |
          DEFAULT_BRANCH=$(git remote show origin | sed -n 's/.*HEAD branch: //p')
          git fetch origin "$DEFAULT_BRANCH"
          git show "origin/$DEFAULT_BRANCH:CHANGELOG.md" > CHANGELOG.md

      - name: Parse changelog
        id: changelog
        run: |
          VERSION="${{ needs.build-setup.outputs.version }}"

          # Extract the body between this version heading and the next heading or link references (or EOF)
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found && /^\[.*\]: /{exit} found{print}" CHANGELOG.md)

          # Trim leading/trailing blank lines from body
          BODY=$(echo "$BODY" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')

          # Use heredoc for multiline body, prepend "## Release Notes"
          {
            echo "body<<CHANGELOG_EOF"
            echo "## Release Notes"
            echo ""
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: [build-setup, build, release-setup]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-setup.outputs.tag }}
          name: ${{ needs.build-setup.outputs.tag }}
          body: ${{ needs.release-setup.outputs.body }}
          files: |
            artifacts/client-recipe-fix-${{ needs.build-setup.outputs.tag }}.jar
            artifacts/client-recipe-fix-${{ needs.build-setup.outputs.tag }}.jar.sha256

  post:
    needs: [build-setup, release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          TAG="${{ needs.build-setup.outputs.tag }}"
          if [ "${{ needs.release.result }}" = "success" ]; then
            echo "### ✅ Release successful" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "**Release:** https://github.com/${{ github.repository }}/releases/tag/${TAG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Release failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "Check the logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi
